name: Update A-share K-line Data

concurrency:
  group: a-share-kline-sync-${{ github.ref }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: "Optional space-separated stock symbols; leave blank to sync all A-shares"
        required: false
        default: ""
  schedule:
    - cron: "30 8 * * 1-5"

jobs:
  update_selected:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.symbols != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      KLINE_DB_PATH: data/candles.db
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      DATA_PROVIDERS: akshare,baostock,tushare
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_DATA_DIR: ${{ secrets.VPS_DATA_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install data dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.sync.txt
      - name: Sync data
        run: |
          SYMBOLS="${{ github.event.inputs.symbols }}"
          python -m kronos_mvp.cli sync $SYMBOLS
      - name: Upload SQLite cache to VPS
        if: env.VPS_HOST != '' && env.VPS_USER != '' && env.VPS_SSH_KEY != '' && env.VPS_DATA_DIR != ''
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          source: "data/candles.db"
          target: ${{ env.VPS_DATA_DIR }}

  update_market_shards:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.symbols == '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        market: [sh, sz, bj]
    env:
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      DATA_PROVIDERS: akshare,baostock,tushare
      SHARD_DB_PATH: data/candles-${{ matrix.market }}.db
      SHARD_PROGRESS_PATH: data/sync-progress-${{ matrix.market }}.json
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install data dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.sync.txt
      - name: Restore shard cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ env.SHARD_DB_PATH }}
            ${{ env.SHARD_PROGRESS_PATH }}
          key: a-share-sync-${{ matrix.market }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            a-share-sync-${{ matrix.market }}-${{ github.ref_name }}-
      - name: Sync market shard
        run: |
          mkdir -p data
          python -m kronos_mvp.cli --db "${SHARD_DB_PATH}" sync --all --market "${{ matrix.market }}" --progress-file "${SHARD_PROGRESS_PATH}" --max-retries 2
      - name: Upload shard state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-shard-${{ matrix.market }}
          if-no-files-found: ignore
          path: |
            ${{ env.SHARD_DB_PATH }}
            ${{ env.SHARD_PROGRESS_PATH }}
      - name: Save shard cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ env.SHARD_DB_PATH }}
            ${{ env.SHARD_PROGRESS_PATH }}
          key: a-share-sync-${{ matrix.market }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}

  merge_market_shards:
    if: ${{ always() && (github.event_name != 'workflow_dispatch' || github.event.inputs.symbols == '') }}
    needs: update_market_shards
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_DATA_DIR: ${{ secrets.VPS_DATA_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install merge dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.sync.txt
      - name: Download shard artifacts
        uses: actions/download-artifact@v4
        with:
          path: data/shards
          pattern: sync-shard-*
          merge-multiple: true
      - name: Merge shard SQLite caches
        run: |
          mkdir -p data
          shopt -s nullglob
          DBS=(data/shards/*.db)
          if [ ${#DBS[@]} -eq 0 ]; then
            echo "No shard SQLite files were produced"
            exit 1
          fi
          python -m kronos_mvp.cli merge-db data/candles.db "${DBS[@]}"
      - name: Upload merged SQLite cache artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-merged-db
          if-no-files-found: ignore
          path: data/candles.db
      - name: Upload merged SQLite cache to VPS
        if: env.VPS_HOST != '' && env.VPS_USER != '' && env.VPS_SSH_KEY != '' && env.VPS_DATA_DIR != ''
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          source: "data/candles.db"
          target: ${{ env.VPS_DATA_DIR }}
