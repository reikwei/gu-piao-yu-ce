name: Update A-share K-line Data

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: "Space-separated stock symbols"
        required: false
        default: "600519 000001"
  schedule:
    - cron: "30 8 * * 1-5"

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      KLINE_DB_PATH: data/candles.db
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      DATA_PROVIDERS: akshare,baostock,tushare
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_DATA_DIR: ${{ secrets.VPS_DATA_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install data dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.sync.txt
      - name: Sync data
        run: |
          SYMBOLS="${{ github.event.inputs.symbols }}"
          if [ -z "$SYMBOLS" ]; then SYMBOLS="600519 000001"; fi
          python -m kronos_mvp.cli sync $SYMBOLS
      - name: Upload SQLite cache to VPS
        if: env.VPS_HOST != '' && env.VPS_USER != '' && env.VPS_SSH_KEY != '' && env.VPS_DATA_DIR != ''
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          source: "data/candles.db"
          target: ${{ env.VPS_DATA_DIR }}
