name: Update A-share K-line Data

concurrency:
  group: a-share-kline-sync-${{ github.ref }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: "Optional space-separated stock symbols; leave blank to sync all A-shares"
        required: false
        default: ""
  schedule:
    - cron: "30 8 * * 1-5"

jobs:
  update_selected:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.symbols != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      KLINE_DB_PATH: data/candles.db
      RELATIVE_DB_PATH: data/relative_strength.db
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      DATA_PROVIDERS: akshare,baostock,tushare
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_DATA_DIR: ${{ secrets.VPS_DATA_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install data dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.sync.txt
      - name: Sync data
        run: |
          SYMBOLS="${{ github.event.inputs.symbols }}"
          python -m kronos_mvp.cli sync $SYMBOLS
          python -m kronos_mvp.cli sync-relative $SYMBOLS
      - name: Upload SQLite cache to VPS via password
        if: env.VPS_HOST != '' && env.VPS_USER != '' && env.VPS_DATA_DIR != '' && (env.VPS_PASSWORD != '' || (env.VPS_SSH_KEY != '' && !contains(env.VPS_SSH_KEY, 'BEGIN ')))
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ env.VPS_PASSWORD != '' && env.VPS_PASSWORD || env.VPS_SSH_KEY }}
          source: "data/candles.db,data/relative_strength.db"
          target: ${{ env.VPS_DATA_DIR }}
      - name: Upload SQLite cache to VPS via SSH key
        if: env.VPS_HOST != '' && env.VPS_USER != '' && env.VPS_SSH_KEY != '' && env.VPS_PASSWORD == '' && env.VPS_DATA_DIR != '' && contains(env.VPS_SSH_KEY, 'BEGIN ')
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          source: "data/candles.db,data/relative_strength.db"
          target: ${{ env.VPS_DATA_DIR }}

  update_market_shards:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.symbols == '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: sh-600
            market: sh
            prefixes: 600
            providers: akshare,baostock,tushare
          - shard: sh-603
            market: sh
            prefixes: 603,605
            providers: akshare,baostock,tushare
          - shard: sh-68
            market: sh
            prefixes: 688,689
            providers: akshare,baostock,tushare
          - shard: sh-601
            market: sh
            prefixes: 601
            providers: akshare,baostock,tushare
          - shard: sz-300
            market: sz
            prefixes: 300
            providers: akshare,baostock,tushare
          - shard: sz-301
            market: sz
            prefixes: 301,302
            providers: akshare,baostock,tushare
          - shard: sz-002
            market: sz
            prefixes: "002"
            providers: akshare,baostock,tushare
          - shard: sz-00
            market: sz
            prefixes: 000,001,003
            providers: akshare,baostock,tushare
          - shard: bj-early
            market: bj
            prefixes: 9200,9201,9202
            providers: akshare
          - shard: bj-mid
            market: bj
            prefixes: 9203,9204,9205
            providers: akshare
          - shard: bj-late
            market: bj
            prefixes: 9206,9207,9208,9209
            providers: akshare
    env:
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      DATA_PROVIDERS: ${{ matrix.providers }}
      SHARD_ID: ${{ matrix.shard }}
      SHARD_MARKET: ${{ matrix.market }}
      SHARD_PREFIXES: ${{ matrix.prefixes }}
      SHARD_DB_PATH: data/candles-${{ matrix.shard }}.db
      SHARD_PROGRESS_PATH: data/sync-progress-${{ matrix.shard }}.json
      SHARD_LOG_PATH: data/sync-log-${{ matrix.shard }}.ndjson
      SHARD_SUMMARY_PATH: data/shard-summary-${{ matrix.shard }}.json
      SHARD_RECOVERY_PASSES: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install data dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.sync.txt
      - name: Restore shard cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ env.SHARD_DB_PATH }}
            ${{ env.SHARD_PROGRESS_PATH }}
          key: a-share-sync-${{ matrix.shard }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            a-share-sync-${{ matrix.shard }}-${{ github.ref_name }}-
      - name: Sync market shard
        id: sync_shard
        run: |
          mkdir -p data
          set -o pipefail
          : > "${SHARD_LOG_PATH}"
          pass=1
          max_passes="${SHARD_RECOVERY_PASSES}"
          while [ "$pass" -le "$max_passes" ]; do
            echo "{\"event\":\"sync_pass\",\"shard\":\"${SHARD_ID}\",\"market\":\"${SHARD_MARKET}\",\"prefixes\":\"${SHARD_PREFIXES}\",\"pass\":${pass},\"max_passes\":${max_passes}}" | tee -a "${SHARD_LOG_PATH}"
            python -m kronos_mvp.cli --db "${SHARD_DB_PATH}" sync --all --market "${SHARD_MARKET}" --prefixes "${SHARD_PREFIXES}" --progress-file "${SHARD_PROGRESS_PATH}" --max-retries 2 | tee -a "${SHARD_LOG_PATH}"
            status=${PIPESTATUS[0]}
            if [ "$status" -eq 0 ]; then
              exit 0
            fi
            if [ ! -f "${SHARD_PROGRESS_PATH}" ] || [ "$pass" -ge "$max_passes" ]; then
              exit "$status"
            fi
            pass=$((pass + 1))
          done
      - name: Report shard summary
        if: always()
        env:
          SYNC_OUTCOME: ${{ steps.sync_shard.outcome }}
        run: |
          python - <<'PY'
          import json
          import os
          from collections import Counter
          from pathlib import Path

          shard = os.environ["SHARD_ID"]
          market = os.environ["SHARD_MARKET"]
          prefixes = os.environ.get("SHARD_PREFIXES", "")
          outcome = os.environ.get("SYNC_OUTCOME", "unknown")
          log_path = Path(os.environ["SHARD_LOG_PATH"])
          progress_path = Path(os.environ["SHARD_PROGRESS_PATH"])
          summary_path = Path(os.environ["SHARD_SUMMARY_PATH"])
          github_step_summary = os.environ["GITHUB_STEP_SUMMARY"]

          error_counts = Counter()
          failed_examples = []

          def categorize_error(error_text: str) -> str:
            text = (error_text or "").lower()
            if "does not support bj" in text:
              return "baostock-bj-unsupported"
            if "proxyerror" in text or "remotedisconnected" in text or "connection" in text or "timeout" in text:
              return "network-or-upstream-transport"
            if "permission" in text or "权限" in text:
              return "permission-denied"
            if "returned no rows" in text:
              return "returned-no-rows"
            if "token" in text:
              return "token-config"
            return (error_text or "unknown")[:120]

          payload = {
            "shard": shard,
            "market": market,
            "prefixes": prefixes.split(",") if prefixes else [],
            "outcome": outcome,
            "status": outcome,
            "symbols": 0,
            "processed": 0,
            "succeeded": 0,
            "failed": 0,
            "updated": 0,
            "rows": 0,
            "retried": 0,
            "remaining": 0,
            "progress_file": str(progress_path),
          }

          if log_path.exists():
              for line in log_path.read_text(encoding="utf-8").splitlines():
                  line = line.strip()
                  if not line:
                      continue
                  try:
                      record = json.loads(line)
                  except json.JSONDecodeError:
                      continue
                  if isinstance(record, dict) and "summary" in record and isinstance(record["summary"], dict):
                      summary = record["summary"]
                      payload.update({key: summary.get(key, payload.get(key)) for key in payload.keys() if key in summary})
                  if isinstance(record, dict) and record.get("ok") is False and record.get("error"):
                      error_text = str(record.get("error"))
                      error_counts[categorize_error(error_text)] += 1
                      if len(failed_examples) < 10:
                          failed_examples.append(
                              {
                                  "symbol": record.get("symbol", ""),
                                  "error": error_text[:240],
                              }
                          )

          if progress_path.exists():
              try:
                  progress = json.loads(progress_path.read_text(encoding="utf-8"))
              except json.JSONDecodeError:
                  progress = {}
              pending = progress.get("pending") if isinstance(progress.get("pending"), list) else []
              summary = progress.get("summary") if isinstance(progress.get("summary"), dict) else {}
              payload["status"] = progress.get("status", payload["status"])
              payload["remaining"] = len(pending)
              for key in ("symbols", "processed", "succeeded", "failed", "updated", "rows", "retried"):
                  if key in summary:
                      payload[key] = summary[key]
          elif payload["symbols"] and payload["processed"] >= payload["symbols"]:
              payload["status"] = "completed"

          payload["error_categories"] = [
              {"category": category, "count": count}
              for category, count in error_counts.most_common(5)
          ]
          payload["failed_examples"] = failed_examples

          summary_path.parent.mkdir(parents=True, exist_ok=True)
          summary_path.write_text(json.dumps(payload, ensure_ascii=False, indent=2), encoding="utf-8")

          line = (
              f"Shard {shard}: outcome={payload['outcome']}, status={payload['status']}, "
              f"succeeded={payload['succeeded']}, failed={payload['failed']}, remaining={payload['remaining']}, "
              f"updated={payload['updated']}, rows={payload['rows']}, retried={payload['retried']}"
          )
          print(line)
          with open(github_step_summary, "a", encoding="utf-8") as fh:
              fh.write(f"### Shard {shard} report\n")
              fh.write("\n")
              fh.write(f"- market: {market}\n")
              fh.write(f"- prefixes: {', '.join(payload['prefixes']) if payload['prefixes'] else 'all'}\n")
              fh.write(f"- outcome: {payload['outcome']}\n")
              fh.write(f"- status: {payload['status']}\n")
              fh.write(f"- succeeded: {payload['succeeded']}\n")
              fh.write(f"- failed: {payload['failed']}\n")
              fh.write(f"- remaining: {payload['remaining']}\n")
              fh.write(f"- updated: {payload['updated']}\n")
              fh.write(f"- rows: {payload['rows']}\n")
              fh.write(f"- retried: {payload['retried']}\n")
              if payload["error_categories"]:
                fh.write("- error_categories:\n")
                for item in payload["error_categories"]:
                  fh.write(f"  - {item['category']}: {item['count']}\n")
              if payload["failed_examples"]:
                fh.write("- failed_examples:\n")
                for item in payload["failed_examples"][:5]:
                  fh.write(f"  - {item['symbol']}: {item['error']}\n")
              fh.write("\n")
          PY
      - name: Upload shard state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-shard-${{ matrix.shard }}
          if-no-files-found: ignore
          path: |
            ${{ env.SHARD_DB_PATH }}
            ${{ env.SHARD_PROGRESS_PATH }}
            ${{ env.SHARD_LOG_PATH }}
            ${{ env.SHARD_SUMMARY_PATH }}
      - name: Save shard cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ env.SHARD_DB_PATH }}
            ${{ env.SHARD_PROGRESS_PATH }}
          key: a-share-sync-${{ matrix.shard }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}

  merge_market_shards:
    if: ${{ always() && (github.event_name != 'workflow_dispatch' || github.event.inputs.symbols == '') }}
    needs: update_market_shards
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_DATA_DIR: ${{ secrets.VPS_DATA_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install merge dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.sync.txt
      - name: Download shard artifacts
        uses: actions/download-artifact@v4
        with:
          path: data/shards
          pattern: sync-shard-*
          merge-multiple: true
      - name: Report shard rollout summary
        id: shard_report
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summaries = []
          for path in sorted(Path("data/shards").glob("shard-summary-*.json")):
            try:
              summaries.append(json.loads(path.read_text(encoding="utf-8")))
            except json.JSONDecodeError:
              continue

          github_output = os.environ["GITHUB_OUTPUT"]
          github_step_summary = os.environ["GITHUB_STEP_SUMMARY"]

          if not summaries:
            print("No shard summary artifacts found")
            with open(github_output, "a", encoding="utf-8") as fh:
              fh.write("all_shards_ok=false\n")
            with open(github_step_summary, "a", encoding="utf-8") as fh:
              fh.write("### Shard rollout summary\n\n- no shard summary artifacts found\n")
            raise SystemExit(0)

          totals = {
            "symbols": sum(int(item.get("symbols", 0) or 0) for item in summaries),
            "processed": sum(int(item.get("processed", 0) or 0) for item in summaries),
            "succeeded": sum(int(item.get("succeeded", 0) or 0) for item in summaries),
            "failed": sum(int(item.get("failed", 0) or 0) for item in summaries),
            "remaining": sum(int(item.get("remaining", 0) or 0) for item in summaries),
            "updated": sum(int(item.get("updated", 0) or 0) for item in summaries),
            "rows": sum(int(item.get("rows", 0) or 0) for item in summaries),
            "retried": sum(int(item.get("retried", 0) or 0) for item in summaries),
          }
          all_ok = all(
            item.get("outcome") == "success"
            and item.get("status") == "completed"
            and int(item.get("failed", 0) or 0) == 0
            and int(item.get("remaining", 0) or 0) == 0
            for item in summaries
          )

          print("Shard rollout summary:")
          for item in summaries:
            print(
              f"  {item.get('shard', item.get('market'))}: outcome={item.get('outcome')}, status={item.get('status')}, "
              f"succeeded={item.get('succeeded')}, failed={item.get('failed')}, remaining={item.get('remaining')}, "
              f"updated={item.get('updated')}, rows={item.get('rows')}, retried={item.get('retried')}"
            )
          print(
            f"  totals: symbols={totals['symbols']}, processed={totals['processed']}, succeeded={totals['succeeded']}, "
            f"failed={totals['failed']}, remaining={totals['remaining']}, updated={totals['updated']}, rows={totals['rows']}, retried={totals['retried']}"
          )

          with open(github_output, "a", encoding="utf-8") as fh:
            fh.write(f"all_shards_ok={'true' if all_ok else 'false'}\n")

          with open(github_step_summary, "a", encoding="utf-8") as fh:
            fh.write("### Shard rollout summary\n\n")
            for item in summaries:
              fh.write(
                f"- {item.get('shard', item.get('market'))}: outcome={item.get('outcome')}, status={item.get('status')}, "
                f"succeeded={item.get('succeeded')}, failed={item.get('failed')}, remaining={item.get('remaining')}, "
                f"updated={item.get('updated')}, rows={item.get('rows')}, retried={item.get('retried')}\n"
              )
            fh.write(
              f"\n- totals: symbols={totals['symbols']}, processed={totals['processed']}, succeeded={totals['succeeded']}, "
              f"failed={totals['failed']}, remaining={totals['remaining']}, updated={totals['updated']}, rows={totals['rows']}, retried={totals['retried']}\n"
            )
            fh.write(f"- all_shards_ok: {'true' if all_ok else 'false'}\n")
          PY
      - name: Merge shard SQLite caches
        run: |
          mkdir -p data
          shopt -s nullglob
          DBS=(data/shards/*.db)
          if [ ${#DBS[@]} -eq 0 ]; then
            echo "No shard SQLite files were produced"
            exit 1
          fi
          python -m kronos_mvp.cli merge-db data/candles.db "${DBS[@]}"
      - name: Sync relative strength cache
        run: |
          python -m kronos_mvp.cli --relative-db data/relative_strength.db sync-relative --history-days 60
      - name: Upload merged SQLite cache artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-merged-db
          if-no-files-found: ignore
          path: |
            data/candles.db
            data/relative_strength.db
      - name: Upload merged SQLite cache to VPS via password
        if: env.VPS_HOST != '' && env.VPS_USER != '' && env.VPS_DATA_DIR != '' && steps.shard_report.outputs.all_shards_ok == 'true' && (env.VPS_PASSWORD != '' || (env.VPS_SSH_KEY != '' && !contains(env.VPS_SSH_KEY, 'BEGIN ')))
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ env.VPS_PASSWORD != '' && env.VPS_PASSWORD || env.VPS_SSH_KEY }}
          source: "data/candles.db,data/relative_strength.db"
          target: ${{ env.VPS_DATA_DIR }}
      - name: Upload merged SQLite cache to VPS via SSH key
        if: env.VPS_HOST != '' && env.VPS_USER != '' && env.VPS_SSH_KEY != '' && env.VPS_PASSWORD == '' && env.VPS_DATA_DIR != '' && steps.shard_report.outputs.all_shards_ok == 'true' && contains(env.VPS_SSH_KEY, 'BEGIN ')
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          source: "data/candles.db,data/relative_strength.db"
          target: ${{ env.VPS_DATA_DIR }}
