name: Deploy App To VPS

concurrency:
  group: app-deploy-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
    paths:
      - .env.example
      - .github/workflows/deploy-app-to-vps.yml
      - README.md
      - deploy/**
      - kronos_mvp/**
      - requirements.txt
      - requirements.sync.txt
      - scripts/**
      - tests/**
  workflow_dispatch:

jobs:
  deploy_app:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_DEPLOY_DIR: ${{ secrets.VPS_DATA_DIR }}
      SAILA_URL: ${{ secrets.SAILA_URL }}
      SAILA_ID: ${{ secrets.SAILA_ID }}
      SAILA_KEY: ${{ secrets.SAILA_KEY }}
      APP_PUBLIC_BASE_URL: ${{ secrets.APP_PUBLIC_BASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Package application archive
        run: |
          mkdir -p dist
          tar \
            --exclude=.git \
            --exclude=.venv \
            --exclude=data \
            --exclude=.env \
            --exclude=.env.* \
            --exclude=push_git.bat \
            -czf dist/app-deploy.tgz \
            .

      - name: Upload deploy archive via password
        if: env.VPS_HOST != '' && env.VPS_USER != '' && env.VPS_DEPLOY_DIR != '' && (env.VPS_PASSWORD != '' || (env.VPS_SSH_KEY != '' && !contains(env.VPS_SSH_KEY, 'BEGIN ')))
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ env.VPS_PASSWORD != '' && env.VPS_PASSWORD || env.VPS_SSH_KEY }}
          source: dist/app-deploy.tgz
          target: /tmp/
          overwrite: true

      - name: Upload deploy archive via SSH key
        if: env.VPS_HOST != '' && env.VPS_USER != '' && env.VPS_SSH_KEY != '' && env.VPS_PASSWORD == '' && env.VPS_DEPLOY_DIR != '' && contains(env.VPS_SSH_KEY, 'BEGIN ')
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          source: dist/app-deploy.tgz
          target: /tmp/
          overwrite: true

      - name: Deploy app on VPS via password
        if: env.VPS_HOST != '' && env.VPS_USER != '' && env.VPS_DEPLOY_DIR != '' && (env.VPS_PASSWORD != '' || (env.VPS_SSH_KEY != '' && !contains(env.VPS_SSH_KEY, 'BEGIN ')))
        uses: appleboy/ssh-action@v1.2.5
        env:
          DEPLOY_DIR: ${{ env.VPS_DEPLOY_DIR }}
          SAILA_URL: ${{ env.SAILA_URL }}
          SAILA_ID: ${{ env.SAILA_ID }}
          SAILA_KEY: ${{ env.SAILA_KEY }}
          APP_PUBLIC_BASE_URL: ${{ env.APP_PUBLIC_BASE_URL }}
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ env.VPS_PASSWORD != '' && env.VPS_PASSWORD || env.VPS_SSH_KEY }}
          envs: DEPLOY_DIR,SAILA_URL,SAILA_ID,SAILA_KEY,APP_PUBLIC_BASE_URL
          script: |
            set -e
            DEPLOY_DIR="${DEPLOY_DIR%/}"
            ARCHIVE_PATH=""
            if [ -f /tmp/app-deploy.tgz ]; then
              ARCHIVE_PATH=/tmp/app-deploy.tgz
            elif [ -f /tmp/dist/app-deploy.tgz ]; then
              ARCHIVE_PATH=/tmp/dist/app-deploy.tgz
            else
              echo "deploy archive not found"
              exit 1
            fi
            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"
            rm -rf kronos_mvp deploy scripts tests .github
            rm -f README.md requirements.txt requirements.sync.txt .env.example .gitignore
            tar -xzf "$ARCHIVE_PATH" -C "$DEPLOY_DIR"
            rm -f /tmp/app-deploy.tgz "$ARCHIVE_PATH"
            rm -rf /tmp/dist
            if [ -x "$DEPLOY_DIR/.venv/bin/pip" ]; then
              "$DEPLOY_DIR/.venv/bin/pip" install -r "$DEPLOY_DIR/requirements.txt"
            fi
            python3 - <<'PY'
            import os
            from pathlib import Path

            env_path = Path(os.environ["DEPLOY_DIR"]) / ".env"
            existing = {}
            if env_path.exists():
              for line in env_path.read_text(encoding="utf-8").splitlines():
                if not line or line.startswith("#") or "=" not in line:
                  continue
                key, value = line.split("=", 1)
                existing[key] = value
            updates = {
              "SAILA_URL": os.environ.get("SAILA_URL", ""),
              "SAILA_ID": os.environ.get("SAILA_ID", ""),
              "SAILA_KEY": os.environ.get("SAILA_KEY", ""),
              "APP_PUBLIC_BASE_URL": os.environ.get("APP_PUBLIC_BASE_URL", "") or "https://tghao.cc.cd",
              "APP_DB_PATH": existing.get("APP_DB_PATH", "data/app.db"),
              "ADMIN_USERNAME": existing.get("ADMIN_USERNAME", "admin"),
            }
            for key, value in updates.items():
              if value:
                existing[key] = value
            env_path.write_text("\n".join(f"{key}={value}" for key, value in existing.items()) + "\n", encoding="utf-8")
            PY
            systemctl restart yupiaoyuce.service
            systemctl is-active yupiaoyuce.service

      - name: Deploy app on VPS via SSH key
        if: env.VPS_HOST != '' && env.VPS_USER != '' && env.VPS_SSH_KEY != '' && env.VPS_PASSWORD == '' && env.VPS_DEPLOY_DIR != '' && contains(env.VPS_SSH_KEY, 'BEGIN ')
        uses: appleboy/ssh-action@v1.2.5
        env:
          DEPLOY_DIR: ${{ env.VPS_DEPLOY_DIR }}
          SAILA_URL: ${{ env.SAILA_URL }}
          SAILA_ID: ${{ env.SAILA_ID }}
          SAILA_KEY: ${{ env.SAILA_KEY }}
          APP_PUBLIC_BASE_URL: ${{ env.APP_PUBLIC_BASE_URL }}
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          envs: DEPLOY_DIR,SAILA_URL,SAILA_ID,SAILA_KEY,APP_PUBLIC_BASE_URL
          script: |
            set -e
            DEPLOY_DIR="${DEPLOY_DIR%/}"
            ARCHIVE_PATH=""
            if [ -f /tmp/app-deploy.tgz ]; then
              ARCHIVE_PATH=/tmp/app-deploy.tgz
            elif [ -f /tmp/dist/app-deploy.tgz ]; then
              ARCHIVE_PATH=/tmp/dist/app-deploy.tgz
            else
              echo "deploy archive not found"
              exit 1
            fi
            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"
            rm -rf kronos_mvp deploy scripts tests .github
            rm -f README.md requirements.txt requirements.sync.txt .env.example .gitignore
            tar -xzf "$ARCHIVE_PATH" -C "$DEPLOY_DIR"
            rm -f /tmp/app-deploy.tgz "$ARCHIVE_PATH"
            rm -rf /tmp/dist
            if [ -x "$DEPLOY_DIR/.venv/bin/pip" ]; then
              "$DEPLOY_DIR/.venv/bin/pip" install -r "$DEPLOY_DIR/requirements.txt"
            fi
            python3 - <<'PY'
            import os
            from pathlib import Path

            env_path = Path(os.environ["DEPLOY_DIR"]) / ".env"
            existing = {}
            if env_path.exists():
              for line in env_path.read_text(encoding="utf-8").splitlines():
                if not line or line.startswith("#") or "=" not in line:
                  continue
                key, value = line.split("=", 1)
                existing[key] = value
            updates = {
              "SAILA_URL": os.environ.get("SAILA_URL", ""),
              "SAILA_ID": os.environ.get("SAILA_ID", ""),
              "SAILA_KEY": os.environ.get("SAILA_KEY", ""),
              "APP_PUBLIC_BASE_URL": os.environ.get("APP_PUBLIC_BASE_URL", "") or "https://tghao.cc.cd",
              "APP_DB_PATH": existing.get("APP_DB_PATH", "data/app.db"),
              "ADMIN_USERNAME": existing.get("ADMIN_USERNAME", "admin"),
            }
            for key, value in updates.items():
              if value:
                existing[key] = value
            env_path.write_text("\n".join(f"{key}={value}" for key, value in existing.items()) + "\n", encoding="utf-8")
            PY
            systemctl restart yupiaoyuce.service
            systemctl is-active yupiaoyuce.service