name: Update A-share News Data

concurrency:
  group: a-share-news-sync-${{ github.ref }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: "Space-separated stock symbols to sync news cache"
        required: false
        default: ""
      limit:
        description: "Maximum raw news rows fetched per symbol"
        required: false
        default: "30"
      refresh_hours:
        description: "Skip symbols synced within this many hours"
        required: false
        default: "12"
  schedule:
    - cron: "35 10 * * 1-5"

jobs:
  trading_day_guard:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.guard.outputs.should_run }}
      shanghai_today: ${{ steps.guard.outputs.shanghai_today }}
      latest_trade_date: ${{ steps.guard.outputs.latest_trade_date }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install data dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.sync.txt

      - name: Resolve trading-day guard
        id: guard
        run: |
          python - <<'PY'
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo

          from kronos_mvp.funds import latest_a_share_trade_date

          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          if event_name != "schedule":
              should_run = True
              shanghai_today = datetime.now(ZoneInfo("Asia/Shanghai")).date()
              latest_trade = shanghai_today
          else:
              shanghai_today = datetime.now(ZoneInfo("Asia/Shanghai")).date()
              latest_trade = latest_a_share_trade_date()
              should_run = shanghai_today == latest_trade

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"should_run={'true' if should_run else 'false'}\n")
              fh.write(f"shanghai_today={shanghai_today.isoformat()}\n")
              fh.write(f"latest_trade_date={latest_trade.isoformat()}\n")

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as fh:
              fh.write("### News trading-day guard\n\n")
              fh.write(f"- event: {event_name}\n")
              fh.write(f"- today: {shanghai_today.isoformat()}\n")
              fh.write(f"- latest_trade_date: {latest_trade.isoformat()}\n")
              fh.write(f"- should_run: {'true' if should_run else 'false'}\n\n")
          PY

  update_selected_news:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.symbols != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      NEWS_DB_PATH: data/news_sentiment.db
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_DATA_DIR: ${{ secrets.VPS_DATA_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install data dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.sync.txt

      - name: Restore news cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.NEWS_DB_PATH }}
          key: a-share-news-selected-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            a-share-news-selected-${{ github.ref_name }}-

      - name: Sync stock news cache
        run: |
          mkdir -p data
          SYMBOLS="${{ github.event.inputs.symbols }}"
          LIMIT="${{ github.event.inputs.limit }}"
          REFRESH_HOURS="${{ github.event.inputs.refresh_hours }}"

          if [ -z "${LIMIT}" ]; then
            LIMIT="30"
          fi
          if [ -z "${REFRESH_HOURS}" ]; then
            REFRESH_HOURS="12"
          fi

          python -m kronos_mvp.cli --news-db "${NEWS_DB_PATH}" sync-news ${SYMBOLS} --limit "${LIMIT}" --refresh-hours "${REFRESH_HOURS}" --max-retries "1"

      - name: Upload news cache artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: news-sentiment-db-selected
          if-no-files-found: ignore
          path: |
            data/news_sentiment.db

      - name: Save news cache
        if: ${{ always() }}
        uses: actions/cache/save@v4
        with:
          path: ${{ env.NEWS_DB_PATH }}
          key: a-share-news-selected-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload news cache to VPS via password
        if: ${{ env.VPS_HOST != '' && env.VPS_USER != '' && env.VPS_DATA_DIR != '' && (env.VPS_PASSWORD != '' || (env.VPS_SSH_KEY != '' && !contains(env.VPS_SSH_KEY, 'BEGIN '))) }}
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ env.VPS_PASSWORD != '' && env.VPS_PASSWORD || env.VPS_SSH_KEY }}
          source: "data/news_sentiment.db"
          target: ${{ env.VPS_DATA_DIR }}

      - name: Upload news cache to VPS via SSH key
        if: ${{ env.VPS_HOST != '' && env.VPS_USER != '' && env.VPS_SSH_KEY != '' && env.VPS_PASSWORD == '' && env.VPS_DATA_DIR != '' && contains(env.VPS_SSH_KEY, 'BEGIN ') }}
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          source: "data/news_sentiment.db"
          target: ${{ env.VPS_DATA_DIR }}

  update_news_shards:
    if: ${{ (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.symbols == '')) && needs.trading_day_guard.outputs.should_run == 'true' }}
    needs: trading_day_guard
    runs-on: ubuntu-latest
    timeout-minutes: 150
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: sh-600
            market: sh
            prefixes: 600
          - shard: sh-603
            market: sh
            prefixes: 603,605
          - shard: sh-68
            market: sh
            prefixes: 688,689
          - shard: sh-601
            market: sh
            prefixes: 601
          - shard: sz-300
            market: sz
            prefixes: 300
          - shard: sz-301
            market: sz
            prefixes: 301,302
          - shard: sz-002
            market: sz
            prefixes: "002"
          - shard: sz-00
            market: sz
            prefixes: 000,001,003
          - shard: bj-early
            market: bj
            prefixes: 9200,9201,9202
          - shard: bj-mid
            market: bj
            prefixes: 9203,9204,9205
          - shard: bj-late
            market: bj
            prefixes: 9206,9207,9208,9209
    env:
      SHARD_DB_PATH: data/news-${{ matrix.shard }}.db
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install data dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.sync.txt

      - name: Restore shard news cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.SHARD_DB_PATH }}
          key: a-share-news-${{ matrix.shard }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            a-share-news-${{ matrix.shard }}-${{ github.ref_name }}-

      - name: Sync news shard incrementally
        run: |
          mkdir -p data
          LIMIT="${{ github.event.inputs.limit }}"
          REFRESH_HOURS="${{ github.event.inputs.refresh_hours }}"

          if [ -z "${LIMIT}" ]; then
            LIMIT="30"
          fi
          if [ -z "${REFRESH_HOURS}" ]; then
            REFRESH_HOURS="12"
          fi

          python -m kronos_mvp.cli \
            --news-db "${SHARD_DB_PATH}" \
            sync-news --all \
            --market "${{ matrix.market }}" \
            --prefixes "${{ matrix.prefixes }}" \
            --limit "${LIMIT}" \
            --refresh-hours "${REFRESH_HOURS}" \
            --max-retries "1"

      - name: Upload shard artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: news-shard-${{ matrix.shard }}
          if-no-files-found: ignore
          path: ${{ env.SHARD_DB_PATH }}

      - name: Save shard news cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ env.SHARD_DB_PATH }}
          key: a-share-news-${{ matrix.shard }}-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}

  merge_and_upload_news:
    if: ${{ needs.trading_day_guard.outputs.should_run == 'true' && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.symbols == '')) }}
    needs:
      - trading_day_guard
      - update_news_shards
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      MERGED_DB_PATH: data/news_sentiment.db
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_DATA_DIR: ${{ secrets.VPS_DATA_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Download shard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: news-shard-*
          path: data/news-shards
          merge-multiple: true

      - name: Merge shard news caches
        run: |
          python - <<'PY'
          import glob
          import sqlite3
          from pathlib import Path

          merged_path = Path("data/news_sentiment.db")
          merged_path.parent.mkdir(parents=True, exist_ok=True)

          shard_paths = sorted(Path(path) for path in glob.glob("data/news-shards/**/*.db", recursive=True))
          if not shard_paths:
              raise SystemExit("No shard databases found for merge")

          conn = sqlite3.connect(merged_path)
          try:
              conn.execute(
                  """
                  CREATE TABLE IF NOT EXISTS stock_news (
                      symbol TEXT NOT NULL,
                      url TEXT NOT NULL,
                      title TEXT NOT NULL,
                      summary TEXT NOT NULL,
                      source TEXT NOT NULL,
                      published_at TEXT NOT NULL,
                      sentiment_score REAL NOT NULL,
                      sentiment_label TEXT NOT NULL,
                      updated_at TEXT NOT NULL,
                      PRIMARY KEY (symbol, url)
                  )
                  """
              )
              conn.execute(
                  "CREATE INDEX IF NOT EXISTS idx_stock_news_symbol_published ON stock_news(symbol, published_at DESC)"
              )

              for index, shard in enumerate(shard_paths):
                  alias = f"shard_{index}"
                  conn.execute(f"ATTACH DATABASE ? AS {alias}", (str(shard),))
                  try:
                      row = conn.execute(
                          f"SELECT name FROM {alias}.sqlite_master WHERE type='table' AND name='stock_news'"
                      ).fetchone()
                      if row is None:
                          continue
                      conn.execute(
                          f"""
                          INSERT OR REPLACE INTO stock_news(
                              symbol,
                              url,
                              title,
                              summary,
                              source,
                              published_at,
                              sentiment_score,
                              sentiment_label,
                              updated_at
                          )
                          SELECT
                              symbol,
                              url,
                              title,
                              summary,
                              source,
                              published_at,
                              sentiment_score,
                              sentiment_label,
                              updated_at
                          FROM {alias}.stock_news
                          """
                      )
                  finally:
                      conn.execute(f"DETACH DATABASE {alias}")

              total = conn.execute("SELECT COUNT(*) FROM stock_news").fetchone()[0]
              print(f"Merged shard databases: {len(shard_paths)}, total rows: {total}")
          finally:
              conn.commit()
              conn.close()
          PY

      - name: Upload merged news artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: news-sentiment-db
          if-no-files-found: error
          path: ${{ env.MERGED_DB_PATH }}

      - name: Upload merged news cache to VPS via password
        if: ${{ env.VPS_HOST != '' && env.VPS_USER != '' && env.VPS_DATA_DIR != '' && (env.VPS_PASSWORD != '' || (env.VPS_SSH_KEY != '' && !contains(env.VPS_SSH_KEY, 'BEGIN '))) }}
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ env.VPS_PASSWORD != '' && env.VPS_PASSWORD || env.VPS_SSH_KEY }}
          source: "data/news_sentiment.db"
          target: ${{ env.VPS_DATA_DIR }}

      - name: Upload merged news cache to VPS via SSH key
        if: ${{ env.VPS_HOST != '' && env.VPS_USER != '' && env.VPS_SSH_KEY != '' && env.VPS_PASSWORD == '' && env.VPS_DATA_DIR != '' && contains(env.VPS_SSH_KEY, 'BEGIN ') }}
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          source: "data/news_sentiment.db"
          target: ${{ env.VPS_DATA_DIR }}
