name: Update Relative Strength Data

concurrency:
  group: relative-strength-sync-${{ github.ref }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: "Optional space-separated stock symbols; leave blank to sync cached market relative strength incrementally"
        required: false
        default: ""
      history_days:
        description: "History window to backfill when the relative strength cache is missing"
        required: false
        default: "30"
  schedule:
    - cron: "20 10 * * 1-5"

jobs:
  update_relative_strength:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      RELATIVE_DB_PATH: data/relative_strength.db
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_DATA_DIR: ${{ secrets.VPS_DATA_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install data dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.sync.txt

      - name: Check A-share trading day
        id: trade_day_guard
        if: ${{ github.event_name == 'schedule' }}
        run: |
          python - <<'PY'
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo

          from kronos_mvp.funds import latest_a_share_trade_date

          shanghai_today = datetime.now(ZoneInfo("Asia/Shanghai")).date()
          latest_trade_date = latest_a_share_trade_date()
          should_skip = shanghai_today != latest_trade_date

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"should_skip={'true' if should_skip else 'false'}\n")
              fh.write(f"shanghai_today={shanghai_today.isoformat()}\n")
              fh.write(f"latest_trade_date={latest_trade_date.isoformat()}\n")

          summary = (
              f"Relative strength schedule guard: today={shanghai_today.isoformat()}, "
              f"latest_trade_date={latest_trade_date.isoformat()}, skip={should_skip}"
          )
          print(summary)
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as fh:
              fh.write("### Relative strength trading-day guard\n\n")
              fh.write(f"- today: {shanghai_today.isoformat()}\n")
              fh.write(f"- latest_trade_date: {latest_trade_date.isoformat()}\n")
              fh.write(f"- skip_sync: {'true' if should_skip else 'false'}\n\n")
          PY

      - name: Restore relative strength cache
        if: ${{ github.event_name != 'schedule' || steps.trade_day_guard.outputs.should_skip != 'true' }}
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.RELATIVE_DB_PATH }}
          key: a-share-relative-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            a-share-relative-${{ github.ref_name }}-

      - name: Sync relative strength cache
        if: ${{ github.event_name != 'schedule' || steps.trade_day_guard.outputs.should_skip != 'true' }}
        run: |
          mkdir -p data
          SYMBOLS="${{ github.event.inputs.symbols }}"
          HISTORY_DAYS="${{ github.event.inputs.history_days }}"
          if [ -z "${HISTORY_DAYS}" ]; then
            HISTORY_DAYS="30"
          fi

          if [ -n "${SYMBOLS}" ]; then
            python -m kronos_mvp.cli --relative-db "${RELATIVE_DB_PATH}" sync-relative ${SYMBOLS} --history-days "${HISTORY_DAYS}"
          else
            python -m kronos_mvp.cli --relative-db "${RELATIVE_DB_PATH}" sync-relative --history-days "${HISTORY_DAYS}"
          fi

      - name: Upload relative strength cache artifact
        if: ${{ always() && (github.event_name != 'schedule' || steps.trade_day_guard.outputs.should_skip != 'true') }}
        uses: actions/upload-artifact@v4
        with:
          name: relative-strength-db
          if-no-files-found: ignore
          path: |
            data/relative_strength.db

      - name: Save relative strength cache
        if: ${{ always() && (github.event_name != 'schedule' || steps.trade_day_guard.outputs.should_skip != 'true') }}
        uses: actions/cache/save@v4
        with:
          path: ${{ env.RELATIVE_DB_PATH }}
          key: a-share-relative-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload relative strength cache to VPS via password
        if: ${{ (github.event_name != 'schedule' || steps.trade_day_guard.outputs.should_skip != 'true') && env.VPS_HOST != '' && env.VPS_USER != '' && env.VPS_DATA_DIR != '' && (env.VPS_PASSWORD != '' || (env.VPS_SSH_KEY != '' && !contains(env.VPS_SSH_KEY, 'BEGIN '))) }}
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ env.VPS_PASSWORD != '' && env.VPS_PASSWORD || env.VPS_SSH_KEY }}
          source: "data/relative_strength.db"
          target: ${{ env.VPS_DATA_DIR }}

      - name: Upload relative strength cache to VPS via SSH key
        if: ${{ (github.event_name != 'schedule' || steps.trade_day_guard.outputs.should_skip != 'true') && env.VPS_HOST != '' && env.VPS_USER != '' && env.VPS_SSH_KEY != '' && env.VPS_PASSWORD == '' && env.VPS_DATA_DIR != '' && contains(env.VPS_SSH_KEY, 'BEGIN ') }}
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          source: "data/relative_strength.db"
          target: ${{ env.VPS_DATA_DIR }}