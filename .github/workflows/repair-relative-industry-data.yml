name: Repair Relative Industry Data

concurrency:
  group: relative-strength-sync-${{ github.ref }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: "Optional space-separated stock symbols; leave blank to repair all cached industry mappings and industry K-lines"
        required: false
        default: ""
      history_days:
        description: "History window to backfill when industry caches are missing"
        required: false
        default: "30"
  schedule:
    - cron: "9 13 * * 0"

jobs:
  repair_relative_industry:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      RELATIVE_DB_PATH: data/relative_strength.db
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      VPS_DATA_DIR: ${{ secrets.VPS_DATA_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install data dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.sync.txt

      - name: Restore relative strength cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.RELATIVE_DB_PATH }}
          key: a-share-relative-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            a-share-relative-${{ github.ref_name }}-

      - name: Repair industry mappings and industry K-lines
        run: |
          mkdir -p data
          SYMBOLS="${{ github.event.inputs.symbols }}"
          HISTORY_DAYS="${{ github.event.inputs.history_days }}"
          if [ -z "${HISTORY_DAYS}" ]; then
            HISTORY_DAYS="30"
          fi

          if [ -n "${SYMBOLS}" ]; then
            python -m kronos_mvp.cli --relative-db "${RELATIVE_DB_PATH}" sync-relative ${SYMBOLS} --history-days "${HISTORY_DAYS}"
          else
            python -m kronos_mvp.cli --relative-db "${RELATIVE_DB_PATH}" sync-relative --history-days "${HISTORY_DAYS}"
          fi

      - name: Verify industry repair result
        env:
          EVENT_NAME: ${{ github.event_name }}
          SYMBOLS: ${{ github.event.inputs.symbols }}
        run: |
          python - <<'PY'
          import os
          import sqlite3
          from pathlib import Path

          db_path = Path(os.environ["RELATIVE_DB_PATH"])
          conn = sqlite3.connect(db_path)
          conn.row_factory = sqlite3.Row

          mapping_total = int(conn.execute("SELECT COUNT(*) FROM symbol_industries").fetchone()[0])
          industry_symbol_total = int(
              conn.execute("SELECT COUNT(DISTINCT symbol) FROM candles WHERE symbol LIKE 'industry:%'").fetchone()[0]
          )

          event_name = os.environ.get("EVENT_NAME", "").strip()
          symbols = [item.strip() for item in os.environ.get("SYMBOLS", "").split() if item.strip()]
          missing_symbols: list[str] = []
          missing_industry_kline: list[str] = []
          verification_status = "ok"
          verification_note = ""

          for symbol in symbols:
              row = conn.execute(
                  "SELECT industry_key FROM symbol_industries WHERE symbol = ?",
                  (symbol,),
              ).fetchone()
              if row is None:
                  missing_symbols.append(symbol)
                  continue
              total = int(
                  conn.execute(
                      "SELECT COUNT(*) FROM candles WHERE symbol = ?",
                      (str(row["industry_key"]),),
                  ).fetchone()[0]
              )
              if total <= 0:
                  missing_industry_kline.append(symbol)

          if symbols and (missing_symbols or missing_industry_kline):
              verification_status = "failed"
              verification_note = (
                  "Relative industry repair did not complete: "
                  f"missing_mappings={missing_symbols}, missing_industry_kline={missing_industry_kline}"
              )
          elif not symbols and (mapping_total <= 0 or industry_symbol_total <= 0):
              verification_status = "warning"
              verification_note = (
                  "No explicit symbols were requested and the relative cache still has no industry mappings or "
                  "industry K-lines. This run stays best-effort; use workflow_dispatch with symbols for a "
                  "deterministic repair."
              )

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as fh:
              fh.write("### Relative industry repair verification\n\n")
              fh.write(f"- event_name: {event_name or 'unknown'}\n")
              fh.write(f"- mapping_total: {mapping_total}\n")
              fh.write(f"- industry_symbol_total: {industry_symbol_total}\n")
              fh.write(f"- verification_status: {verification_status}\n")
              if symbols:
                  fh.write(f"- requested_symbols: {', '.join(symbols)}\n")
                  fh.write(f"- missing_mappings: {', '.join(missing_symbols) if missing_symbols else 'none'}\n")
                  fh.write(
                      f"- missing_industry_kline: {', '.join(missing_industry_kline) if missing_industry_kline else 'none'}\n"
                  )
              if verification_note:
                  fh.write(f"- note: {verification_note}\n")
              fh.write("\n")

          conn.close()

          if verification_status == "failed":
              raise SystemExit(verification_note)
          if verification_status == "warning":
              print(f"::warning::{verification_note}")
          PY

      - name: Upload relative strength repair artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relative-strength-industry-repair-db
          if-no-files-found: ignore
          path: |
            data/relative_strength.db

      - name: Save relative strength cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ env.RELATIVE_DB_PATH }}
          key: a-share-relative-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload relative strength cache to VPS via password
        if: ${{ env.VPS_HOST != '' && env.VPS_USER != '' && env.VPS_DATA_DIR != '' && (env.VPS_PASSWORD != '' || (env.VPS_SSH_KEY != '' && !contains(env.VPS_SSH_KEY, 'BEGIN '))) }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ env.VPS_PASSWORD != '' && env.VPS_PASSWORD || env.VPS_SSH_KEY }}
          source: "data/relative_strength.db"
          target: ${{ env.VPS_DATA_DIR }}

      - name: Upload relative strength cache to VPS via SSH key
        if: ${{ env.VPS_HOST != '' && env.VPS_USER != '' && env.VPS_SSH_KEY != '' && env.VPS_PASSWORD == '' && env.VPS_DATA_DIR != '' && contains(env.VPS_SSH_KEY, 'BEGIN ') }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          source: "data/relative_strength.db"
          target: ${{ env.VPS_DATA_DIR }}